name: Build

on:
  push:
    branches:
      - main


jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      - name: npm install  denpendency
        run: npm install 
        
      - name: Trivy file scan 
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          output: 'trivyfs.txt'
          exit-code: '0'
          run: trivy fs . > trivyfs.txt
             
      - name: Docker Build and push 
        run: |
          docker build -t pac-man-game .
          docker tag pac-man-game riley280/pac-man-game:latest
          docker login -u ${{ vars.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN }}
          docker push riley280/pac-man-game:latest
          env:
          DOCKER_CLI_ACI:1
    
